name: Sync Upstream (rstudio/rstudio)

on:
  workflow_dispatch:
  workflow_call:

jobs:
  sync-upstream:
    name: Sync branches and tags from rstudio/rstudio
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/rstudio/rstudio || git remote set-url upstream https://github.com/rstudio/rstudio

      - name: Fetch upstream tags
        run: |
          git fetch upstream --tags --no-recurse-submodules

      - name: Sync tags (skip seqera-*)
        run: |
          git ls-remote --tags upstream | awk '{print $2}' | grep -v '\^{}' | sed 's|refs/tags/||' | grep -v '^seqera-' | while read tag; do
            echo "Syncing tag: $tag"
            git push origin "refs/tags/${tag}:refs/tags/${tag}" || true
          done

      - name: Summary
        run: |
          echo "=== Non-seqera tags now available in origin ==="
          git ls-remote --tags origin | awk '{print $2}' | grep -v '\^{}' | sed 's|refs/tags/||' | grep -v '^seqera-' | sort -rV
