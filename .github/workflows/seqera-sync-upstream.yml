name: Sync Upstream

on:
  workflow_dispatch:
  workflow_call:

jobs:
  sync-upstream:
    name: Sync branches and tags from upstream
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/rstudio/rstudio || git remote set-url upstream https://github.com/rstudio/rstudio

      - name: Fetch upstream tags
        run: |
          git fetch upstream --tags --no-recurse-submodules

      # WARNING: This works with current tag pattern, where first part is the year of release, example: `v2026.01.2+418`.
      # If this pattern changes in the future this task will have to be updated.
      - name: Sync tags with upstream starting from v2020
        run: |
          git ls-remote --tags upstream | awk '{print $2}' | grep -v '\^{}' | sed 's|refs/tags/||' | grep '^v20[2-9][0-9]' | while read tag; do
            echo "Syncing tag: $tag"
            git push origin "refs/tags/${tag}:refs/tags/${tag}" || true
          done

      - name: Summary
        run: |
          echo "=== Non-seqera tags now available in origin ==="
          git ls-remote --tags origin | awk '{print $2}' | grep -v '\^{}' | sed 's|refs/tags/||' | grep '^v20[2-9][0-9]' | sort -rV
